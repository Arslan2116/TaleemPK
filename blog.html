<style>
  :root{--navy:#0A1628;--green:#00C853;--gray-100:#F8F9FA;--gray-200:#E9ECEF;--gray-400:#868E96;--gray-600:#495057;--shadow:0 2px 12px rgba(0,0,0,0.08);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sora',sans-serif;background:#f4f6f9;color:var(--navy);min-height:100vh;}
  a{color:inherit;text-decoration:none;}

  /* NAV */
  nav{background:var(--navy);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
  .nav-logo{font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:-0.5px;}
  .nav-logo span{color:var(--green);}
  .nav-back{color:var(--gray-400);font-size:0.85rem;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
  .nav-back:hover{color:#fff;}

  /* BREADCRUMB */
  .breadcrumb{max-width:800px;margin:24px auto 0;padding:0 5%;font-size:0.8rem;color:var(--gray-400);}
  .breadcrumb a{color:var(--green);}
  .breadcrumb span{margin:0 6px;}

  /* ARTICLE */
  .article-wrap{max-width:800px;margin:24px auto 80px;padding:0 5%;}
  .article-card{background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
  .article-header{padding:40px 48px 32px;}
  .article-cat{display:inline-block;background:rgba(0,200,83,0.1);color:var(--green);font-size:0.75rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px;}
  .article-title{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;color:var(--navy);line-height:1.3;margin-bottom:16px;}
  .article-meta{font-size:0.82rem;color:var(--gray-400);display:flex;gap:16px;align-items:center;flex-wrap:wrap;padding-bottom:24px;border-bottom:1px solid var(--gray-200);}
  .article-body{padding:32px 48px 40px;}
  .article-body p{font-size:0.97rem;color:var(--gray-600);line-height:1.9;margin-bottom:18px;}
  .article-body h3{font-size:1.15rem;font-weight:700;color:var(--navy);margin:28px 0 12px;}
  .article-body ul{margin:0 0 18px 24px;}
  .article-body li{font-size:0.95rem;color:var(--gray-600);line-height:1.8;margin-bottom:6px;}
  .article-body strong{color:var(--navy);}
  .article-body a{color:var(--green);text-decoration:underline;}

  /* NOT FOUND */
  .not-found{text-align:center;padding:80px 24px;}
  .not-found h2{font-size:1.5rem;margin-bottom:12px;}
  .not-found p{color:var(--gray-400);margin-bottom:24px;}
  .btn-home{display:inline-block;background:var(--green);color:#fff;font-weight:700;padding:12px 28px;border-radius:8px;font-size:0.9rem;}

  /* RELATED */
  .related{margin-top:40px;}
  .related h3{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:16px;}
  .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
  .related-card{background:#fff;border-radius:12px;padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--gray-200);transition:border-color 0.2s,transform 0.2s;cursor:pointer;}
  .related-card:hover{border-color:var(--green);transform:translateY(-3px);}
  .related-card-cat{font-size:0.72rem;font-weight:700;color:var(--green);text-transform:uppercase;margin-bottom:6px;}
  .related-card-title{font-size:0.9rem;font-weight:700;color:var(--navy);line-height:1.4;}
  .related-card-date{font-size:0.75rem;color:var(--gray-400);margin-top:8px;}

  /* FOOTER */
  footer{background:var(--navy);color:var(--gray-400);text-align:center;padding:24px;font-size:0.82rem;}
  footer a{color:var(--green);}

  @media(max-width:600px){
    .article-header,.article-body{padding:24px 20px;}
  }
</style>

<body>

<nav>
  <a href="/" class="nav-logo">Taleem <span>PK</span></a>
  <a href="/" class="nav-back">← All Universities</a>
</nav>

<div class="breadcrumb" id="breadcrumb">
  <a href="/">Home</a><span>›</span><a href="/#news">Blog</a><span>›</span><span id="breadcrumbTitle">Loading…</span>
</div>

<div class="article-wrap">
  <div id="articleContent"><div class="article-card" style="padding:60px;text-align:center;color:var(--gray-400);">Loading…</div></div>
  <div class="related" id="relatedSection" style="display:none;">
    <h3>More Articles</h3>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</div>

<footer>© <span id="yr"></span> TaleemPK · <a href="/">Compare Universities in Pakistan</a></footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// ── Blog posts (same as index.html NEWS_POSTS) ──
const POSTS = [
  {
    id: 4,
    title: "Entry Test Preparation: A Smart Study Plan for ECAT & MDCAT",
    category: "Test Prep",
    icon: "📝",
    date: "2026-05-30",
    author: "TaleemPK Team",
    excerpt: "Entry tests can make or break your admission. Here is a practical, week-by-week strategy to prepare for ECAT and MDCAT without burning out.",
    body: `
      <p>For most engineering and medical aspirants, the entry test carries the highest weightage in the final merit. A focused study plan matters more than long, unstructured hours.</p>
      <h3>Step 1: Know the Pattern</h3>
      <p>Download the official syllabus for <strong>ECAT</strong> (engineering) or <strong>MDCAT</strong> (medical). Both are largely based on the FSc curriculum, so your textbooks are your best resource.</p>
      <h3>Step 2: Build a Weekly Plan</h3>
      <ul>
        <li><strong>Weeks 1–4:</strong> Cover the full syllabus subject by subject.</li>
        <li><strong>Weeks 5–8:</strong> Solve past papers and topic-wise MCQs daily.</li>
        <li><strong>Final 2 weeks:</strong> Full-length timed mock tests to build speed and accuracy.</li>
      </ul>
      <h3>Step 3: Review Your Mistakes</h3>
      <p>Maintain an error log. Revising the questions you got wrong is the fastest way to improve your score.</p>
      <p><em>Tip: Use the <a href="/">Admission Predictor on TaleemPK</a> to see which universities match your expected aggregate.</em></p>
    `
  },
  {
    id: 1,
    title: "How to Calculate Your University Aggregate (Merit) in Pakistan",
    category: "Admission Guide",
    icon: "📊",
    date: "2026-05-28",
    author: "TaleemPK Team",
    excerpt: "Most universities weigh Matric, Intermediate, and the entry test differently. Learn the standard aggregate formula and how to estimate your merit before applying.",
    body: `
      <p>Your <strong>aggregate</strong> (also called merit percentage) decides which universities you can get into. Each university uses its own weightage, but the most common formula in Pakistan is:</p>
      <ul>
        <li><strong>Matric:</strong> 10%</li>
        <li><strong>Intermediate / FSc:</strong> 40%</li>
        <li><strong>Entry Test (e.g. ECAT, MDCAT, NTS):</strong> 50%</li>
      </ul>
      <h3>Example</h3>
      <p>If a student scores 85% in Matric, 80% in FSc, and 70% in the entry test, the aggregate is roughly (8.5 + 32 + 35) = <strong>75.5%</strong>.</p>
      <p>Always check each university's official prospectus, as weightage varies — engineering and medical universities especially rely heavily on the entry test.</p>
    `
  },
  {
    id: 2,
    title: "Top Scholarships for Pakistani University Students in 2026",
    category: "Scholarships",
    icon: "🎓",
    date: "2026-05-20",
    author: "TaleemPK Team",
    excerpt: "From the HEC Need-Based Scholarship to Ehsaas Undergraduate Scholarships — a quick overview of major funding options and who qualifies.",
    body: `
      <p>Higher education can be expensive, but several scholarships make it affordable for deserving students:</p>
      <ul>
        <li><strong>Ehsaas Undergraduate Scholarship:</strong> For students from low-income families. Covers full tuition at public universities.</li>
        <li><strong>HEC Need-Based Scholarship:</strong> Available at most HEC-recognized universities. Apply through your university's financial aid office.</li>
        <li><strong>PEEF Scholarship:</strong> Punjab Educational Endowment Fund — for Punjab domicile holders with good academic records.</li>
        <li><strong>Prime Minister's Laptop Scheme:</strong> Laptops for top-performing students at public universities.</li>
      </ul>
      <p>Check the <a href="/">Scholarships section on TaleemPK</a> for deadlines and eligibility details.</p>
    `
  },
  {
    id: 3,
    title: "Public vs Private Universities in Pakistan: Which Is Right for You?",
    category: "University Guide",
    icon: "🏛️",
    date: "2026-05-10",
    author: "TaleemPK Team",
    excerpt: "Lower fees vs better facilities — the public vs private debate is real. Here is how to think through the decision based on your field, budget, and goals.",
    body: `
      <p>Choosing between a public and private university is one of the most important decisions a Pakistani student makes. Here is a balanced breakdown:</p>
      <h3>Public Universities</h3>
      <ul>
        <li>Lower fees (PKR 30k–150k/year typically)</li>
        <li>Strong research culture and faculty at top institutions (NUST, QAU, UET)</li>
        <li>Competitive admission — merit-based entry tests required</li>
        <li>Government recognition and employer trust</li>
      </ul>
      <h3>Private Universities</h3>
      <ul>
        <li>More flexible admission criteria</li>
        <li>Modern campuses and industry linkages (LUMS, GIKI, Habib)</li>
        <li>Higher fees (PKR 200k–800k/year), but scholarships available</li>
        <li>Smaller class sizes and more personalized attention</li>
      </ul>
      <p>Use the <a href="/">Compare tool on TaleemPK</a> to put your shortlisted universities side by side before deciding.</p>
    `
  }
];

function toSlug(title){
  return title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function fmtDate(d){
  if(!d) return '';
  return new Date(d).toLocaleDateString('en-PK',{year:'numeric',month:'long',day:'numeric'});
}

function setSEO(p){
  const slug = toSlug(p.title);
  const canon = `https://taleempk.pk/blog/${slug}`;
  document.getElementById('pageTitle').textContent = `${p.title} | TaleemPK Blog`;
  document.getElementById('metaDesc').setAttribute('content', p.excerpt);
  document.getElementById('ogTitle').setAttribute('content', `${p.title} | TaleemPK`);
  document.getElementById('ogDesc').setAttribute('content', p.excerpt);
  document.getElementById('twTitle').setAttribute('content', `${p.title} | TaleemPK`);
  document.getElementById('twDesc').setAttribute('content', p.excerpt);
  document.getElementById('canonicalUrl').setAttribute('href', canon);
  document.getElementById('breadcrumbTitle').textContent = p.title;

  // Article JSON-LD
  const ld = {
    "@context":"https://schema.org",
    "@type":"Article",
    "headline": p.title,
    "description": p.excerpt,
    "author":{"@type":"Organization","name": p.author||'TaleemPK'},
    "publisher":{"@type":"Organization","name":"TaleemPK","url":"https://taleempk.pk","logo":{"@type":"ImageObject","url":"https://taleempk.pk/logo.png"}},
    "datePublished": p.date,
    "dateModified": p.date,
    "url": canon,
    "image": "https://taleempk.pk/og-image.svg",
    "mainEntityOfPage":{"@type":"WebPage","@id": canon}
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(ld);
  document.head.appendChild(s);

  // BreadcrumbList JSON-LD
  const bl = {
    "@context":"https://schema.org",
    "@type":"BreadcrumbList",
    "itemListElement":[
      {"@type":"ListItem","position":1,"name":"Home","item":"https://taleempk.pk/"},
      {"@type":"ListItem","position":2,"name":"Blog","item":"https://taleempk.pk/#news"},
      {"@type":"ListItem","position":3,"name":p.title,"item":canon}
    ]
  };
  const bs = document.createElement('script');
  bs.type = 'application/ld+json';
  bs.textContent = JSON.stringify(bl);
  document.head.appendChild(bs);
}

// Basic HTML escape for fields we control (title, category, author).
// Body is intentionally rendered as HTML because admins use formatting tags —
// we sanitise on save in admin.html and rely on RLS to prevent any non-admin writes.
function bEsc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderPost(p){
  setSEO(p);
  document.getElementById('articleContent').innerHTML = `
    <article class="article-card">
      <div class="article-header">
        <div class="article-cat">${bEsc(p.category||'Article')}</div>
        <h1 class="article-title">${bEsc(p.title)}</h1>
        <div class="article-meta">
          <span>✍️ ${bEsc(p.author||'TaleemPK')}</span>
          <span>📅 ${bEsc(fmtDate(p.date))}</span>
          <span>${bEsc(p.icon||'📰')} ${bEsc(p.category||'')}</span>
        </div>
      </div>
      <div class="article-body">${p.body||'<p>'+bEsc(p.excerpt||'')+'</p>'}</div>
    </article>`;

  // Related posts — pull from in-memory ALL_POSTS (loaded async)
  const pool = (window.ALL_POSTS && window.ALL_POSTS.length) ? window.ALL_POSTS : POSTS;
  const related = pool.filter(x => (x.id||x.title) !== (p.id||p.title)).slice(0,3);
  if(related.length){
    document.getElementById('relatedSection').style.display='';
    document.getElementById('relatedGrid').innerHTML = related.map(r=>`
      <a href="/blog/${toSlug(r.title)}" class="related-card">
        <div class="related-card-cat">${bEsc(r.category||'Article')}</div>
        <div class="related-card-title">${bEsc(r.icon||'📰')} ${bEsc(r.title)}</div>
        <div class="related-card-date">${bEsc(fmtDate(r.date))}</div>
      </a>`).join('');
  }
}

function notFound(){
  document.getElementById('articleContent').innerHTML = `
    <div class="article-card not-found">
      <h2>Article not found</h2>
      <p>This article may have been moved or deleted.</p>
      <a href="/" class="btn-home">← Back to TaleemPK</a>
    </div>`;
  document.getElementById('breadcrumbTitle').textContent = 'Not Found';
}

// Fetch admin-published posts from Supabase (falls back to hard-coded POSTS)
window.ALL_POSTS = POSTS.slice();
async function fetchSupabasePosts(){
  if(!(window.TPK_CONFIG && window.TPK_CONFIG.SUPABASE_URL)) return [];
  try{
    const url = window.TPK_CONFIG.SUPABASE_URL + '/rest/v1/blog_posts?select=id,title,category,icon,author,excerpt,body,created_at&published=eq.true&order=created_at.desc';
    const r = await fetch(url, { headers: {
      apikey: window.TPK_CONFIG.SUPABASE_ANON_KEY,
      Authorization: 'Bearer ' + window.TPK_CONFIG.SUPABASE_ANON_KEY
    }});
    if(!r.ok) return [];
    const rows = await r.json();
    return (rows||[]).map(p => ({
      id: p.id, title: p.title, category: p.category, icon: p.icon || '📰',
      date: p.created_at ? p.created_at.split('T')[0] : '',
      author: p.author || 'TaleemPK Team',
      excerpt: p.excerpt, body: p.body
    }));
  }catch(e){ return []; }
}

// Read slug from URL path: /blog/ecat-preparation-guide
async function init(){
  const pathMatch = location.pathname.match(/\/blog\/([^/?#]+)/);
  if(!pathMatch){ notFound(); return; }
  const slug = pathMatch[1];
  // Try hard-coded first (instant for the curated SEO posts)
  let post = POSTS.find(p => toSlug(p.title) === slug);
  if(post){ renderPost(post); }
  // Then merge in DB posts in the background (also enables related-post variety)
  const dbPosts = await fetchSupabasePosts();
  if(dbPosts.length){
    window.ALL_POSTS = [...POSTS, ...dbPosts];
    if(!post){
      const dbPost = dbPosts.find(p => toSlug(p.title) === slug);
      if(dbPost){ renderPost(dbPost); return; }
    }
  }
  if(!post) notFound();
}

init();
</script>
</body>
</html>
