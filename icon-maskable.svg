<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable icon — important content stays inside the safe zone (40% inset)
       so that Android/iOS can crop into circle, squircle, rounded square, etc.
       without cutting off the brand mark. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#143864"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Safe zone is roughly the inner 80% — keep T inside this -->
  <g transform="translate(256,256)">
    <text x="0" y="62" text-anchor="middle"
          font-family="Sora, Inter, Arial, sans-serif"
          font-weight="900"
          font-size="240"
          fill="#ffffff"
          letter-spacing="-8">T</text>
    <rect x="-72" y="100" width="144" height="14" rx="7" fill="#00C853"/>
  </g>
</svg>
